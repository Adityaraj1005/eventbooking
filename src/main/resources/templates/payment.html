<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Payment</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"/>
</head>
<body>
<div th:replace="~{navbar :: navbar}"></div>
<div class="container mt-4" style="max-width: 500px;">
    <h3>Payment Summary</h3>
    <p><strong>Event:</strong> <span th:text="${booking.event.eventName}"></span></p>
    <p><strong>Venue:</strong> <span th:text="${booking.event.venue}"></span></p>
    <p><strong>Date:</strong> <span th:text="${booking.event.date}"></span></p>
    <p><strong>People:</strong> <span th:text="${booking.numberOfPeople}"></span></p>
    <p><strong>Price Per Person:</strong> ₹<span th:text="${booking.event.price}"></span></p>
    <hr/>
    <h5>Total Amount: ₹<span th:text="${booking.numberOfPeople * booking.event.price}"></span></h5>

    <form th:action="@{/payment/{bookingId}/confirm(bookingId=${booking.id})}" method="post">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
        <button type="submit" class="btn btn-success">
            Pay Now ₹<span th:text="${booking.numberOfPeople * booking.event.price}"></span>
        </button>
    </form>

    <form th:action="@{/booking/cancel/{id}(id=${booking.id})}" method="post">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
        <button type="submit" class="btn btn-danger mt-2"
                onclick="return confirm('Cancel this booking?')">Cancel Booking</button>
    </form>

</div>
</body>
</html>
