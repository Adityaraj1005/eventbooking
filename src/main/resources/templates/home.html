<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <title>Home</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"/>
</head>
<body>
<div th:replace="~{navbar :: navbar}"></div>

<div class="container text-center mt-5">
    <h1>Welcome to Event Booking!</h1>
    <p class="text-muted mt-3">Book your favourite events easily and quickly.</p>
    <hr/>
    <p>Click below to proceed:</p>

    <a href="/events" class="btn btn-primary me-2">View Events</a>

    <a href="/login" class="btn btn-outline-dark me-2"
       sec:authorize="isAnonymous()">Login</a>

    <a href="/register" class="btn btn-outline-success"
       sec:authorize="isAnonymous()">Register</a>

</div>
</body>
</html>
