<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Events</title>


</head>
<body>
<h1>All Events</h1>
<h3>This page contains all events:</h3>
<table>
    <tr>
        <th>Event Name</th>
        <th>Date</th>
        <th>Venue</th>
        <th>Price</th>
    </tr>
    <tr th:each="event : ${events}">
        <td th:text="${event.eventName}"></td>
        <td th:text="${event.date}"></td>
        <td th:text="${event.venue}"></td>
        <td th:text="${event.price}"></td>
    </tr>
</table>



</body>
</html>
