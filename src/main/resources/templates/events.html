<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Events</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"/>
</head>
<body>
<div th:replace="~{navbar :: navbar}"></div>
<div class="container mt-4">

    <h2>All Events</h2>

    <table class="table table-bordered">
        <thead>
        <tr>
            <th>Event Name</th>
            <th>Date</th>
            <th>Venue</th>
            <th>Price</th>
            <th>Available Seats</th>
            <th>Edit</th>
            <th>Delete</th>
            <th>Book</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="event : ${events}">
            <td th:text="${event.eventName}"></td>
            <td th:text="${event.date}"></td>
            <td th:text="${event.venue}"></td>
            <td th:text="${event.price}"></td>
            <td th:text="${event.availableCapacity}"></td>
            <td>
                <a th:href="@{/admin/events/edit/{id}(id=${event.id})}">Edit</a>
            </td>
            <td>
                <a th:href="@{/admin/events/delete/{id}(id=${event.id})}">Delete</a>
            </td>
            <td>
                <a th:href="@{/booking/event/{id}(id=${event.id})}">Book Now</a>
            </td>
        </tr>
        <tr th:if="${#lists.isEmpty(events)}">
            <td colspan="8">No events found.</td>
        </tr>
        </tbody>
    </table>

</div>

</body>
</html>
