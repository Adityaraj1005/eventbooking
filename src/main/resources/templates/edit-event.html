<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Edit Event</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"/>
</head>
<body>
<div th:replace="~{navbar :: navbar}"></div>
<div class="container mt-4" style="max-width: 600px;">

    <h2>Edit Event</h2>

    <form th:action="@{/admin/events/edit/{id}(id=${event.id})}"
          th:object="${event}" method="post">

        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>

        <div class="mb-3">
            <label for="eventName">Event Name</label>
            <input type="text" id="eventName" th:field="*{eventName}" class="form-control"/>
        </div>

        <div class="mb-3">
            <label for="eventDescription">Event Description</label>
            <textarea id="eventDescription" th:field="*{eventDescription}"
                      class="form-control" rows="3"></textarea>
        </div>

        <div class="mb-3">
            <label for="venue">Venue</label>
            <input type="text" id="venue" th:field="*{venue}" class="form-control"/>
        </div>

        <div class="mb-3">
            <label for="eventType">Event Type</label>
            <input type="text" id="eventType" th:field="*{eventType}" class="form-control"/>
        </div>

        <div class="mb-3">
            <label for="Date">Event Date</label>
            <input type="date" id="Date" th:field="*{Date}" class="form-control"/>
        </div>

        <div class="mb-3">
            <label for="lastBookingDate">Last Booking Date</label>
            <input type="date" id="lastBookingDate" th:field="*{lastBookingDate}" class="form-control"/>
        </div>

        <div class="mb-3">
            <label for="startTime">Start Time</label>
            <input type="time" id="startTime" th:field="*{startTime}" class="form-control"/>
        </div>

        <div class="mb-3">
            <label for="endTime">End Time</label>
            <input type="time" id="endTime" th:field="*{endTime}" class="form-control"/>
        </div>

        <div class="mb-3">
            <label for="price">Price</label>
            <input type="number" id="price" th:field="*{price}" class="form-control" min="0"/>
        </div>

        <div class="mb-3">
            <label for="totalCapacity">Total Capacity</label>
            <input type="number" id="totalCapacity" th:field="*{totalCapacity}" class="form-control" min="1"/>
        </div>

        <div class="mb-3">
            <label for="availableCapacity">Available Capacity</label>
            <input type="number" id="availableCapacity" th:field="*{availableCapacity}" class="form-control" min="0"/>
        </div>

        <button type="submit" class="btn btn-primary">Save Event</button>
        <a th:href="@{/admin/events}" class="btn btn-link">Cancel</a>

    </form>
</div>

</body>
</html>
