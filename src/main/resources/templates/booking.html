<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Book Event</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"/>
</head>
<body>
<div th:replace="~{navbar :: navbar}"></div>
<div class="container mt-4" style="max-width: 500px;">

    <h2>Book Event</h2>

    <form th:action="@{/booking/event/{eventId}(eventId=${event.id})}"
          th:object="${booking}" method="post">

        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>

        <div class="mb-3">
            <label for="eventName">Event Name</label>
            <input type="text" id="eventName" th:value="${event.eventName}"
                   class="form-control" readonly/>
        </div>

        <div class="mb-3">
            <label for="date">Event Date</label>
            <input type="text" id="date" th:value="${event.date}"
                   class="form-control" readonly/>
        </div>

        <div class="mb-3">
            <label for="venue">Venue</label>
            <input type="text" id="venue" th:value="${event.venue}"
                   class="form-control" readonly/>
        </div>

        <div class="mb-3">
            <label for="price">Price Per Person</label>
            <input type="text" id="price" th:value="${event.price}"
                   class="form-control" readonly/>
        </div>

        <div class="mb-3">
            <label for="numberOfPeople">Number of People</label>
            <input type="number" id="numberOfPeople"
                   th:field="*{numberOfPeople}"
                   class="form-control" min="1"/>
        </div>

        <button type="submit" class="btn btn-primary">Confirm Booking</button>
        <a th:href="@{/events}" class="btn btn-link">Cancel</a>

    </form>
</div>

</body>
</html>
