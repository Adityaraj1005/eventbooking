<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>My Bookings</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"/>
</head>
<body>
<div th:replace="~{navbar :: navbar}"></div>
<div class="container mt-4">

    <h2>My Bookings</h2>

    <table class="table table-bordered">
        <thead>
        <tr>
            <th>Event Name</th>
            <th>Date</th>
            <th>Venue</th>
            <th>People</th>
            <th>Status</th>
            <th>Cancel</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="booking : ${bookings}">
            <td th:text="${booking.event.eventName}"></td>
            <td th:text="${booking.bookingDate}"></td>
            <td th:text="${booking.event.venue}"></td>
            <td th:text="${booking.numberOfPeople}"></td>
            <td th:text="${booking.bookingStatus}"></td>
            <td>
                <form th:action="@{/booking/cancel/{id}(id=${booking.id})}" method="post">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                    <button type="submit" class="btn btn-danger btn-sm">Cancel</button>
                </form>
            </td>
        </tr>
        <tr th:if="${#lists.isEmpty(bookings)}">
            <td colspan="6">You have no bookings yet.</td>
        </tr>
        </tbody>
    </table>

    <a th:href="@{/events}" class="btn btn-primary">Browse Events</a>

</div>

<div th:if="${successMessage}" class="alert alert-success" th:text="${successMessage}"></div>

</body>
</html>
