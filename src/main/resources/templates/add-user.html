<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Add New User</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"/>
</head>
<body>

<div class="container mt-4" style="max-width: 500px;">

    <h2>Add New User</h2>

    <form th:action="@{/admin/users/add}" th:object="${user}" method="post">

        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>

        <div class="mb-3">
            <label for="name">User Name</label>
            <input type="text" id="name" th:field="*{name}" class="form-control"/>
        </div>

        <div class="mb-3">
            <label for="email">User Email</label>
            <input type="email" id="email" th:field="*{email}" class="form-control"/>
        </div>

        <div class="mb-3">
            <label for="password">Password</label>
            <input type="password" id="password" th:field="*{password}" class="form-control"/>
        </div>

        <div class="mb-3">
            <label for="mobileNo">Mobile No.</label>
            <input type="text" id="mobileNo" th:field="*{mobileNo}" class="form-control"/>
        </div>

        <div class="mb-3">
            <label for="role">Role</label>
            <select id="role" th:field="*{role}" class="form-select">
                <option value="ADMIN">Admin</option>
                <option value="USER">User</option>
            </select>
        </div>

        <div class="mb-3">
            <label for="dob">Date Of Birth</label>
            <input type="date" id="dob" th:field="*{dob}" class="form-control"/>
        </div>

        <div class="mb-3">
            <label for="gender">Gender</label>
            <select id="gender" th:field="*{gender}" class="form-select">
                <option value="Male">Male</option>
                <option value="Female">Female</option>
                <option value="Other">Other</option>
            </select>
        </div>

        <button type="submit" class="btn btn-primary">Save User</button>
        <a th:href="@{/admin/users}" class="btn btn-link">Cancel</a>

    </form>
</div>

</body>
</html>
