<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>All Bookings</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"/>
</head>
<body>
<div th:replace="~{navbar :: navbar}"></div>
<div class="container mt-4">

    <h2>All Bookings</h2>

    <table class="table table-bordered">
        <thead>
        <tr>
            <th>Booking ID</th>
            <th>User Name</th>
            <th>User Email</th>
            <th>Event Name</th>
            <th>Booking Date</th>
            <th>People</th>
            <th>Status</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="booking : ${bookings}">
            <td th:text="${booking.id}"></td>
            <td th:text="${booking.user.name}"></td>
            <td th:text="${booking.user.email}"></td>
            <td th:text="${booking.event.eventName}"></td>
            <td th:text="${booking.bookingDate}"></td>
            <td th:text="${booking.numberOfPeople}"></td>
            <td th:text="${booking.bookingStatus}"></td>
        </tr>
        <tr th:if="${#lists.isEmpty(bookings)}">
            <td colspan="7">No bookings found.</td>
        </tr>
        </tbody>
    </table>

    <a th:href="@{/admin}" class="btn btn-secondary">Back to Admin</a>

</div>

</body>
</html>
