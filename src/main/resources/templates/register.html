<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Register</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"/>
</head>
<body>
<div th:replace="~{navbar :: navbar}"></div>
<div class="container mt-4" style="max-width: 500px;">

    <h2>Register</h2>

    <form th:action="@{/register}" th:object="${user}" method="post">

        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>

        <div class="mb-3">
            <label for="name">User Name</label>
            <input type="text" id="name" th:field="*{name}" class="form-control"/>
            <span th:if="${#fields.hasErrors('name')}"
                  th:errors="*{name}"
                  class="text-danger small"></span>
        </div>

        <div class="mb-3">
            <label for="email">User Email</label>
            <input type="email" id="email" th:field="*{email}" class="form-control"/>
            <span th:if="${#fields.hasErrors('email')}"
                  th:errors="*{email}"
                  class="text-danger small"></span>
        </div>

        <div class="mb-3">
            <label for="password">Password</label>
            <input type="password" id="password" th:field="*{password}" class="form-control"/>
            <span th:if="${#fields.hasErrors('password')}"
                  th:errors="*{password}"
                  class="text-danger small"></span>
        </div>

        <div class="mb-3">
            <label for="mobileNo">Mobile No.</label>
            <input type="text" id="mobileNo" th:field="*{mobileNo}" class="form-control"/>
            <span th:if="${#fields.hasErrors('mobileNo')}"
                  th:errors="*{mobileNo}"
                  class="text-danger small"></span>
        </div>

        <div class="mb-3">
            <label for="dob">Date Of Birth</label>
            <input type="date" id="dob" th:field="*{dob}" class="form-control"/>
        </div>

        <div class="mb-3">
            <label for="gender">Gender</label>
            <select id="gender" th:field="*{gender}" class="form-select">
                <option value="">-- Select Gender --</option>
                <option value="Male">Male</option>
                <option value="Female">Female</option>
                <option value="Other">Other</option>
            </select>
        </div>

        <button type="submit" class="btn btn-primary">Register</button>
        <a th:href="@{/login}" class="btn btn-link">Already have an account?</a>

    </form>

</div>
</body>
</html>
