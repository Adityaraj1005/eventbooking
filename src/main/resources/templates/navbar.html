<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<body>

<nav class="navbar navbar-dark bg-dark p-2" th:fragment="navbar">

    <a class="navbar-brand" href="/events">Event Booking</a>

    <div>
        <a class="btn btn-outline-light btn-sm" href="/events">Events</a>

        <a class="btn btn-outline-light btn-sm" href="/my-bookings"
           sec:authorize="isAuthenticated()">My Bookings</a>

        <a class="btn btn-outline-light btn-sm" href="/admin/events/add"
           sec:authorize="hasRole('ADMIN')">Add Event</a>

        <a class="btn btn-outline-light btn-sm" href="/admin/bookings"
           sec:authorize="hasRole('ADMIN')">All Bookings</a>

        <a class="btn btn-outline-light btn-sm" href="/users"
           sec:authorize="hasRole('ADMIN')">Users</a>

        <a class="btn btn-outline-light btn-sm" href="/login"
           sec:authorize="isAnonymous()">Login</a>

        <a class="btn btn-outline-light btn-sm" href="/register"
           sec:authorize="isAnonymous()">Register</a>

        <form th:action="@{/logout}" method="post" style="display:inline"
              sec:authorize="isAuthenticated()">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
            <button type="submit" class="btn btn-danger btn-sm">Logout</button>
        </form>
    </div>

</nav>

</body>
</html>
